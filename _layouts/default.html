<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title | default: "Photography Timer" }}</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      line-height: 1.6;
      color: #1f2328;
      background: #ffffff;
    }
    .wrap { max-width: 720px; margin: 0 auto; padding: 2.5rem 1.25rem 1rem; }
    main h1 { font-size: 2rem; line-height: 1.25; margin: 0 0 1rem; }
    main h2 { margin-top: 2rem; }
    main a { color: #0969da; }
    main ul { padding-left: 1.25rem; }
    main li { margin: 0.25rem 0; }
    .store-badges { display: flex; flex-wrap: wrap; gap: 1.25rem; align-items: flex-start; margin: 1rem 0; }
    .store-badges figure { margin: 0; }
    .store-badges figcaption { font-size: 0.8rem; color: #59636e; margin-top: 0.35rem; max-width: 200px; }
    footer {
      max-width: 720px;
      margin: 2.5rem auto 0;
      padding: 1.25rem;
      border-top: 1px solid #d0d7de;
      font-size: 0.875rem;
      color: #59636e;
    }
    footer p { margin: 0.25rem 0; }
    footer a { color: #59636e; }
    @media (prefers-color-scheme: dark) {
      body { color: #e6edf3; background: #0d1117; }
      main a { color: #4493f8; }
      footer { border-top-color: #30363d; color: #9198a1; }
      footer a { color: #9198a1; }
      .store-badges figcaption { color: #9198a1; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <main>
      {{ content }}
    </main>
  </div>
  <footer>
    <p>&copy; 2026 Sangwook Han &middot; Photography Timer</p>
  </footer>
</body>
</html>
